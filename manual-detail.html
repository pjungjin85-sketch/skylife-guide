<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>전산 매뉴얼</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --red: #E60012; --red2: #CC0010; --red-light: #FFF5F5; --red-border: #FFCCCC;
      --black: #1A1A1A; --dark: #333; --mid: #666; --light: #999;
      --bg: #fff; --bg2: #F7F7F7; --bg3: #FAFAFA;
      --border: #E8E8E8;
      --shadow: 0 2px 12px rgba(0,0,0,.08);
      --shadow-hover: 0 6px 24px rgba(0,0,0,.12);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg2); color: var(--dark); font-family: 'Noto Sans KR', sans-serif; min-height: 100vh; }

    /* HEADER */
    header { background: var(--bg); border-top: 3px solid var(--red); border-bottom: 1px solid var(--border); box-shadow: var(--shadow); }
    .header-inner { max-width: 1300px; margin: 0 auto; padding: 0 24px; height: 52px; display: flex; align-items: center; gap: 14px; }
    .header-back { background: none; border: 1px solid var(--border); border-radius: 4px; padding: 5px 12px; font-size: 12px; font-weight: 700; color: var(--mid); cursor: pointer; transition: all .15s; font-family: inherit; text-decoration: none; display: inline-block; }
    .header-back:hover { border-color: var(--red); color: var(--red); }
    .header-breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--light); }
    .header-breadcrumb .sep { color: var(--border); }
    .header-breadcrumb .current { color: var(--black); font-weight: 700; }
    .header-logo { font-size: 15px; font-weight: 900; color: var(--black); margin-right: 4px; }
    .header-logo span { color: var(--red); }
    .header-badge { background: var(--red); color: #fff; font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 3px; letter-spacing: .04em; white-space: nowrap; }

    /* LAYOUT */
    .layout { max-width: 1300px; margin: 0 auto; padding: 20px 24px 60px; display: grid; grid-template-columns: 240px 1fr; gap: 20px; align-items: start; }

    /* SIDEBAR */
    .sidebar { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; position: sticky; top: 20px; box-shadow: var(--shadow); }
    .sidebar-header { padding: 14px 16px; border-bottom: 1px solid var(--border); background: var(--bg3); }
    .sidebar-label { font-size: 9px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--red); margin-bottom: 5px; }
    .sidebar-item-title { font-size: 13px; font-weight: 700; color: var(--black); line-height: 1.4; }
    .step-list { padding: 6px 0; }
    .step-btn { width: 100%; background: none; border: none; padding: 9px 16px; text-align: left; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: all .15s; font-family: inherit; border-left: 2px solid transparent; }
    .step-btn:hover { background: var(--bg2); }
    .step-btn.active { background: var(--red-light); border-left-color: var(--red); }
    .step-btn.done .step-num { background: #16A34A; }
    .step-num { width: 22px; height: 22px; border-radius: 50%; background: var(--border); color: var(--mid); font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .15s; }
    .step-btn.active .step-num { background: var(--red); color: #fff; }
    .step-label { font-size: 12px; color: var(--mid); line-height: 1.4; }
    .step-btn.active .step-label { color: var(--dark); font-weight: 700; }

    /* CONTENT */
    .content { display: flex; flex-direction: column; gap: 14px; }

    /* STEP CARD */
    .step-card { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; box-shadow: var(--shadow); }
    .step-card-header { padding: 16px 20px 0; display: flex; align-items: center; gap: 10px; }
    .step-card-num { width: 28px; height: 28px; border-radius: 50%; background: var(--red); color: #fff; font-size: 13px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .step-card-title { font-size: 16px; font-weight: 900; color: var(--black); }
    .step-card-body { padding: 14px 20px 20px; display: flex; flex-direction: column; gap: 14px; }
    .step-desc { font-size: 13px; color: var(--dark); line-height: 1.9; white-space: pre-line; }

    /* IMAGE */
    .step-image-wrap { border: 1px solid var(--border); border-radius: 4px; overflow: hidden; background: var(--bg2); cursor: zoom-in; }
    .step-image-wrap img { width: 100%; height: auto; display: block; transition: opacity .2s; }
    .step-image-wrap:hover img { opacity: .95; }
    .no-image { padding: 40px; text-align: center; color: var(--light); font-size: 12px; }

    /* NAV */
    .step-nav { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-top: 1px solid var(--border); background: var(--bg3); }
    .nav-btn { background: none; border: 1px solid var(--border); border-radius: 4px; padding: 6px 14px; font-size: 12px; font-weight: 700; color: var(--mid); cursor: pointer; transition: all .15s; font-family: inherit; }
    .nav-btn:hover:not(:disabled) { border-color: var(--red); color: var(--red); }
    .nav-btn:disabled { opacity: .35; cursor: not-allowed; }
    .step-progress { font-size: 12px; color: var(--light); font-weight: 500; }

    /* LIGHTBOX */
    .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,.92); display: none; align-items: center; justify-content: center; z-index: 1000; cursor: zoom-out; }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 4px; }
    .lightbox-close { position: absolute; top: 16px; right: 20px; background: rgba(255,255,255,.15); border: none; border-radius: 50%; width: 32px; height: 32px; color: #fff; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

    /* LOCK */
    .lock-overlay { position: fixed; inset: 0; background: var(--bg2); z-index: 9999; display: flex; align-items: center; justify-content: center; }
    .lock-box { background: var(--bg); border: 1px solid var(--border); border-top: 3px solid var(--red); border-radius: 6px; padding: 40px 36px; width: 340px; box-shadow: var(--shadow-hover); text-align: center; }
    .lock-logo { font-size: 18px; font-weight: 900; color: var(--black); margin-bottom: 6px; }
    .lock-logo span { color: var(--red); }
    .lock-title { font-size: 13px; color: var(--mid); margin-bottom: 24px; }
    .lock-input { width: 100%; padding: 11px 14px; border: 1px solid var(--border); border-radius: 4px; font-size: 15px; font-family: inherit; text-align: center; letter-spacing: .2em; outline: none; transition: border-color .15s; }
    .lock-input:focus { border-color: var(--red); }
    .lock-btn { width: 100%; margin-top: 12px; padding: 11px; background: var(--red); color: #fff; border: none; border-radius: 4px; font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer; transition: background .15s; }
    .lock-btn:hover { background: var(--red2); }
    .lock-error { margin-top: 10px; font-size: 12px; color: var(--red); min-height: 18px; }
    footer { text-align: center; padding: 16px; color: var(--light); font-size: 11px; border-top: 1px solid var(--border); }

    /* ── 모바일 반응형 ── */
    .mob-chevron { display: none; }
    @media(max-width:768px) {
      .layout { grid-template-columns: 1fr; padding: 10px 12px 40px; gap: 8px; }
      .sidebar { display: none; }
      .step-card-header { padding: 14px 16px; justify-content: space-between; cursor: pointer; border-bottom: 1px solid var(--border); }
      .step-card:not(.mob-open) .step-card-header { border-bottom: none; }
      .mob-chevron { display: block; color: var(--red); font-size: 22px; flex-shrink: 0; line-height: 1; transition: transform .25s; }
      .step-card.mob-open .mob-chevron { transform: rotate(90deg); }
      .step-card-body { display: none; padding: 12px 16px 16px; }
      .step-card.mob-open .step-card-body { display: flex; }
      .step-nav { display: none; }
    }
  /* 앱 공통 서브 네비게이션 */
.app-subnav{background:var(--bg);border-bottom:2px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;position:sticky;top:56px;z-index:90;box-shadow:0 1px 4px rgba(0,0,0,.04);}
.app-subnav::-webkit-scrollbar{display:none;}
.app-subnav-inner{display:flex;min-width:max-content;padding:0 16px;}
.app-subnav-item{display:flex;align-items:center;gap:5px;padding:10px 14px;font-size:12px;font-weight:600;color:var(--mid);text-decoration:none;white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-2px;transition:color .15s,border-color .15s;}
.app-subnav-item:hover{color:var(--dark);}
.app-subnav-item.active{color:var(--red);border-bottom-color:var(--red);font-weight:700;}
.app-subnav-icon{font-size:14px;line-height:1;}
</style>
</head>
<body>

<div class="lock-overlay" id="lockOverlay">
  <div class="lock-box">
    <div class="lock-logo">kt <span>skylife</span></div>
    <div class="lock-title">전산 매뉴얼 — 비밀번호를 입력하세요</div>
    <input type="password" class="lock-input" id="lockInput" placeholder="비밀번호" maxlength="20" autocomplete="off">
    <button class="lock-btn" onclick="checkPassword()">확인</button>
    <div class="lock-error" id="lockError"></div>
  </div>
</div>
<header>
  <div class="header-inner">
    <div class="header-logo">kt <span>skylife</span></div>
    <span class="header-badge">MOBILE</span>
    <a class="header-back" id="backBtn" href="manual.html">← 목록</a>
    <div class="header-breadcrumb">
      <span id="breadcrumbCat"></span>
      <span class="sep">›</span>
      <span class="current" id="breadcrumbItem"></span>
    </div>
  </div>
</header>
<nav class="app-subnav"><div class="app-subnav-inner"><a href="index.html" class="app-subnav-item"><span class="app-subnav-icon">🏠</span>현장영업</a><a href="plans.html" class="app-subnav-item"><span class="app-subnav-icon">📋</span>요금제</a><a href="addons.html" class="app-subnav-item"><span class="app-subnav-icon">➕</span>부가서비스</a><a href="calculator.html" class="app-subnav-item"><span class="app-subnav-icon">💰</span>수수료</a><a href="faq.html" class="app-subnav-item"><span class="app-subnav-icon">❓</span>FAQ</a><a href="manual.html" class="app-subnav-item active"><span class="app-subnav-icon">📖</span>매뉴얼</a><a href="inquiry.html" class="app-subnav-item"><span class="app-subnav-icon">💬</span>문의</a></div></nav>

<div class="layout" id="layout" style="display:none">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-label">처리 단계</div>
      <div class="sidebar-item-title" id="sidebarTitle"></div>
    </div>
    <div class="step-list" id="stepList"></div>
  </aside>
  <div class="content" id="contentArea"></div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightboxImg" src="" alt="">
</div>

<footer>KT Skylife 전산 매뉴얼 · <strong>create by 박정진</strong></footer>

<script>
  let DATA = { categories: [], items: [] };
  let currentItem = null;

  async function loadData() {
    try {
      const res = await fetch('data/manual.json?t=' + Date.now());
      DATA = await res.json();
      const id = new URLSearchParams(location.search).get('id');
      if (!id) { location.href = 'manual.html'; return; }
      currentItem = DATA.items.find(i => i.id === id);
      if (!currentItem) { location.href = 'manual.html'; return; }
      renderDetail();
    } catch (e) {
      document.body.textContent = '데이터를 불러올 수 없습니다.';
    }
  }

  function renderDetail() {
    const item = currentItem;
    const cat = DATA.categories.find(c => c.id === item.categoryId);
    document.title = item.title + ' — KT Skylife 전산 매뉴얼';
    document.getElementById('breadcrumbCat').textContent = cat ? cat.icon + ' ' + cat.name : '';
    document.getElementById('breadcrumbItem').textContent = item.title;
    document.getElementById('backBtn').href = 'manual.html?cat=' + encodeURIComponent(item.categoryId);
    document.getElementById('sidebarTitle').textContent = item.title;

    // 사이드바 단계 목록
    const stepList = document.getElementById('stepList');
    stepList.innerHTML = '';
    item.steps.forEach((step, idx) => {
      const btn = document.createElement('button');
      btn.className = 'step-btn' + (idx === 0 ? ' active' : '');
      btn.onclick = () => scrollToStep(idx);
      const num = document.createElement('span'); num.className = 'step-num'; num.textContent = step.order;
      const lbl = document.createElement('span'); lbl.className = 'step-label'; lbl.textContent = step.title;
      btn.append(num, lbl);
      stepList.appendChild(btn);
    });

    // 단계 카드
    const contentArea = document.getElementById('contentArea');
    contentArea.innerHTML = '';
    item.steps.forEach((step, idx) => {
      const card = document.createElement('div');
      card.className = 'step-card'; card.id = 'step-' + idx;

      const header = document.createElement('div'); header.className = 'step-card-header';
      const num = document.createElement('div'); num.className = 'step-card-num'; num.textContent = step.order;
      const title = document.createElement('div'); title.className = 'step-card-title'; title.textContent = step.title;
      const chevron = document.createElement('span'); chevron.className = 'mob-chevron'; chevron.textContent = '›';
      header.append(num, title, chevron);
      header.addEventListener('click', () => toggleMobStep(card));

      const body = document.createElement('div'); body.className = 'step-card-body';

      const desc = document.createElement('div'); desc.className = 'step-desc'; desc.textContent = step.description;
      body.appendChild(desc);

      if (step.image) {
        const wrap = document.createElement('div'); wrap.className = 'step-image-wrap'; wrap.onclick = () => openLightbox(step.image);
        const img = document.createElement('img'); img.src = step.image; img.alt = step.title + ' 화면';
        img.loading = 'lazy';
        wrap.appendChild(img); body.appendChild(wrap);
      } else {
        const noImg = document.createElement('div'); noImg.className = 'no-image'; noImg.textContent = '🖼️ 이미지 준비 중';
        body.appendChild(noImg);
      }

      // 이전/다음 네비게이션
      const nav = document.createElement('div'); nav.className = 'step-nav';
      const prev = document.createElement('button'); prev.className = 'nav-btn'; prev.textContent = '← 이전'; prev.disabled = idx === 0;
      prev.onclick = () => scrollToStep(idx - 1);
      const prog = document.createElement('span'); prog.className = 'step-progress'; prog.textContent = (idx + 1) + ' / ' + item.steps.length + '단계';
      const next = document.createElement('button'); next.className = 'nav-btn'; next.textContent = '다음 →'; next.disabled = idx === item.steps.length - 1;
      next.onclick = () => scrollToStep(idx + 1);
      nav.append(prev, prog, next);

      card.append(header, body, nav);
      contentArea.appendChild(card);
    });

    document.getElementById('layout').style.display = '';
    setupScrollSpy();
    if (window.innerWidth <= 768) {
      const firstCard = contentArea.querySelector('.step-card');
      if (firstCard) firstCard.classList.add('mob-open');
    }
  }

  function toggleMobStep(card) {
    if (window.innerWidth > 768) return;
    const isOpen = card.classList.contains('mob-open');
    document.querySelectorAll('.step-card').forEach(c => c.classList.remove('mob-open'));
    if (!isOpen) card.classList.add('mob-open');
  }

  function scrollToStep(idx) {
    const el = document.getElementById('step-' + idx);
    if (!el) return;
    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    updateActiveStep(idx);
  }

  function updateActiveStep(idx) {
    document.querySelectorAll('.step-btn').forEach((btn, i) => {
      btn.classList.toggle('active', i === idx);
      if (i < idx) btn.classList.add('done'); else btn.classList.remove('done');
    });
  }

  function setupScrollSpy() {
    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const idx = parseInt(entry.target.id.replace('step-', ''));
          updateActiveStep(idx);
        }
      });
    }, { threshold: 0.3 });
    document.querySelectorAll('.step-card').forEach(el => observer.observe(el));
  }

  function openLightbox(src) {
    document.getElementById('lightboxImg').src = src;
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.getElementById('lightboxImg').src = '';
    document.body.style.overflow = '';
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
  loadData();
</script>
<script>
  (function(){
    if(sessionStorage.getItem("manual_auth")==="ok"){
      document.getElementById("lockOverlay").style.display="none";
    }
    document.getElementById("lockInput").addEventListener("keydown",function(e){if(e.key==="Enter")checkPassword();});
  })();
  const CORRECT_HASH = "c8fd219f17e06dac4b1977f8a2f343daa1a095b61bccd1ab71db7c98e435ced4";
  async function sha256(m){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(m));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');}
  async function checkPassword(){
    var v=document.getElementById("lockInput").value;
    if(await sha256(v)===CORRECT_HASH){
      sessionStorage.setItem("manual_auth","ok");
      document.getElementById("lockOverlay").style.display="none";
    } else {
      document.getElementById("lockError").textContent="비밀번호가 올바르지 않습니다.";
      document.getElementById("lockInput").value="";
      document.getElementById("lockInput").focus();
    }
  }
</script>
</body>
</html>
