<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KT Skylife 모바일 전산 매뉴얼</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --red: #E60012; --red2: #CC0010; --red-light: #FFF5F5; --red-border: #FFCCCC;
      --black: #1A1A1A; --dark: #333; --mid: #666; --light: #999;
      --bg: #fff; --bg2: #F7F7F7; --bg3: #FAFAFA;
      --border: #E8E8E8;
      --shadow: 0 2px 12px rgba(0,0,0,.08);
      --shadow-hover: 0 6px 24px rgba(0,0,0,.12);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg2); color: var(--dark); font-family: 'Noto Sans KR', sans-serif; min-height: 100vh; }

    /* HEADER */
    header { background: var(--bg); border-top: 3px solid var(--red); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow); }
    .header-inner { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; height: 56px; padding: 0 24px; gap: 16px; }
    .logo-text { font-size: 17px; font-weight: 900; color: var(--black); letter-spacing: -.02em; white-space: nowrap; }
    .logo-text span { color: var(--red); }
    .header-badge { background: var(--red); color: #fff; font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 3px; letter-spacing: .04em; white-space: nowrap; }
    .header-title { font-size: 15px; font-weight: 700; color: var(--dark); }

    /* SEARCH */
    .search-bar { background: var(--bg); border-bottom: 1px solid var(--border); padding: 10px 24px; }
    .search-bar-inner { max-width: 1100px; margin: 0 auto; }
    .search-wrap { position: relative; max-width: 480px; }
    .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--light); font-size: 14px; pointer-events: none; }
    .search-input { width: 100%; padding: 9px 36px 9px 34px; border: 1px solid var(--border); border-radius: 5px; font-size: 13px; font-family: inherit; outline: none; color: var(--dark); background: var(--bg2); transition: border-color .15s; }
    .search-input:focus { border-color: var(--red); background: #fff; }
    .search-input::placeholder { color: var(--light); }
    .search-clear { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--light); font-size: 16px; display: none; line-height: 1; }
    .search-clear.visible { display: block; }

    /* MAIN */
    main { max-width: 1100px; margin: 24px auto; padding: 0 24px 60px; }

    /* HERO */
    .hero { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 28px 28px 24px; margin-bottom: 24px; position: relative; overflow: hidden; box-shadow: var(--shadow); }
    .hero::after { content: ''; position: absolute; right: -60px; bottom: -60px; width: 240px; height: 240px; border-radius: 50%; background: radial-gradient(circle, rgba(230,0,18,.06) 0%, transparent 70%); pointer-events: none; }
    .hero-tag { display: inline-flex; align-items: center; gap: 5px; background: var(--red-light); border: 1px solid var(--red-border); color: var(--red); font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 3px; margin-bottom: 12px; letter-spacing: .04em; }
    .hero h1 { font-size: 22px; font-weight: 900; color: var(--black); line-height: 1.3; margin-bottom: 6px; }
    .hero h1 em { color: var(--red); font-style: normal; }
    .hero p { font-size: 13px; color: var(--mid); line-height: 1.7; }
    .red-line { width: 36px; height: 3px; background: var(--red); margin-top: 14px; border-radius: 2px; }

    /* SECTION */
    .section-title { font-size: 10px; font-weight: 700; letter-spacing: .12em; color: var(--red); text-transform: uppercase; margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }

    /* CATEGORY GRID */
    #categories-section { margin-bottom: 28px; }
    .categories-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(148px, 1fr)); gap: 10px; }
    .category-card { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 18px 14px; cursor: pointer; transition: all .18s; text-align: center; user-select: none; box-shadow: var(--shadow); }
    .category-card:hover { border-color: var(--red-border); box-shadow: var(--shadow-hover); transform: translateY(-2px); }
    .category-card.active { border-color: var(--red); border-left: 3px solid var(--red); }
    .category-icon { font-size: 26px; margin-bottom: 8px; }
    .category-name { font-size: 14px; font-weight: 700; color: var(--black); margin-bottom: 3px; }
    .category-desc { font-size: 11px; color: var(--light); line-height: 1.4; }
    .category-count { display: inline-block; margin-top: 8px; background: var(--red-light); color: var(--red); font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 3px; border: 1px solid var(--red-border); }
    .category-card.active .category-count { background: var(--red); color: #fff; border-color: var(--red); }

    /* ITEMS */
    #items-section { display: none; }
    .items-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .back-btn { background: none; border: 1px solid var(--border); border-radius: 4px; padding: 5px 12px; font-size: 12px; font-weight: 700; color: var(--mid); cursor: pointer; transition: all .15s; font-family: inherit; }
    .back-btn:hover { border-color: var(--red); color: var(--red); }
    .items-title { font-size: 18px; font-weight: 900; color: var(--black); }
    .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; }
    .item-card { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 18px; cursor: pointer; transition: all .18s; text-decoration: none; display: block; box-shadow: var(--shadow); }
    .item-card:hover { border-color: var(--red-border); box-shadow: var(--shadow-hover); transform: translateY(-2px); }
    .item-card-label { font-size: 9px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--red); margin-bottom: 6px; }
    .item-title { font-size: 14px; font-weight: 700; color: var(--black); line-height: 1.4; margin-bottom: 5px; }
    .item-desc { font-size: 12px; color: var(--mid); line-height: 1.5; margin-bottom: 12px; }
    .item-meta { display: flex; align-items: center; justify-content: space-between; }
    .item-steps { font-size: 11px; color: var(--light); }
    .item-arrow { color: var(--red); font-size: 14px; font-weight: 700; }

    /* SEARCH RESULTS */
    #search-section { display: none; }
    .search-result-count { font-size: 12px; color: var(--mid); margin-bottom: 12px; font-weight: 500; }
    .result-item { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 14px 18px; cursor: pointer; transition: all .18s; text-decoration: none; display: flex; align-items: flex-start; gap: 12px; margin-bottom: 8px; box-shadow: var(--shadow); }
    .result-item:hover { border-color: var(--red-border); box-shadow: var(--shadow-hover); }
    .result-badge { background: var(--red-light); color: var(--red); border: 1px solid var(--red-border); font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 3px; white-space: nowrap; margin-top: 2px; flex-shrink: 0; }
    .result-info { flex: 1; }
    .result-title { font-size: 14px; font-weight: 700; color: var(--black); margin-bottom: 3px; }
    .result-desc { font-size: 12px; color: var(--mid); line-height: 1.4; }
    mark.hl { background: #FEF08A; border-radius: 2px; padding: 0 1px; font-style: normal; }
    .no-results { text-align: center; padding: 60px 20px; color: var(--light); }
    .no-results-icon { font-size: 40px; margin-bottom: 10px; }
    .empty-state { text-align: center; padding: 48px 20px; color: var(--light); font-size: 13px; }

    /* LOCK */
    .lock-overlay { position: fixed; inset: 0; background: var(--bg2); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .lock-box { background: var(--bg); border: 1px solid var(--border); border-top: 3px solid var(--red); border-radius: 16px; padding: 44px 40px 36px; width: 100%; max-width: 360px; box-shadow: 0 4px 32px rgba(0,0,0,0.08); text-align: center; }
    .lock-icon { font-size: 48px; margin-bottom: 12px; display: block; animation: lock-pulse 2s ease-in-out infinite; }
    @keyframes lock-pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
    .lock-title { font-size: 20px; font-weight: 900; color: var(--black); margin-bottom: 4px; }
    .lock-sub { font-size: 11px; color: var(--light); margin-bottom: 28px; }
    .lock-input-wrap { position: relative; margin-bottom: 12px; }
    .lock-input { width: 100%; padding: 14px 52px 14px 18px; border: 1.5px solid var(--red); border-radius: 10px; font-size: 16px; font-family: inherit; text-align: center; letter-spacing: .15em; outline: none; transition: border-color .15s; background: #fff; color: var(--black); }
    .lock-input::placeholder { letter-spacing: .05em; font-size: 14px; color: #BBBBBB; }
    .lock-input.error { animation: lock-shake 0.4s ease; }
    @keyframes lock-shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-8px)} 40%,80%{transform:translateX(8px)} }
    .lock-toggle { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 18px; color: #BBBBBB; transition: color .15s; }
    .lock-toggle:hover { color: var(--red); }
    .lock-btn { width: 100%; padding: 14px; background: var(--red); color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: 800; font-family: inherit; cursor: pointer; transition: all .18s; }
    .lock-btn:hover { background: var(--red2); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(230,0,18,0.25); }
    .lock-error { margin-top: 10px; font-size: 12px; color: var(--red); min-height: 18px; }
    .lock-footer { margin-top: 24px; color: #CCCCCC; font-size: 11px; line-height: 1.8; border-top: 1px solid #F0F0F0; padding-top: 16px; }
    footer { text-align: center; padding: 20px; color: var(--light); font-size: 11px; border-top: 1px solid var(--border); margin-top: 20px; }
  /* 앱 공통 서브 네비게이션 */
.app-subnav{background:var(--bg);border-bottom:2px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;position:sticky;top:56px;z-index:90;box-shadow:0 1px 4px rgba(0,0,0,.04);}
.app-subnav::-webkit-scrollbar{display:none;}
.app-subnav-inner{display:flex;min-width:max-content;padding:0 16px;}
.app-subnav-item{display:flex;align-items:center;gap:5px;padding:10px 14px;font-size:12px;font-weight:600;color:var(--mid);text-decoration:none;white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-2px;transition:color .15s,border-color .15s;}
.app-subnav-item:hover{color:var(--dark);}
.app-subnav-item.active{color:var(--red);border-bottom-color:var(--red);font-weight:700;}
.app-subnav-icon{font-size:14px;line-height:1;}
</style>
</head>
<body>

<div class="lock-overlay" id="lockOverlay">
  <div class="lock-box">
    <span class="lock-icon">🔐</span>
    <div class="lock-title">전산 매뉴얼</div>
    <div class="lock-sub">접근 권한이 필요한 페이지입니다</div>
    <div class="lock-input-wrap">
      <input type="password" class="lock-input" id="lockInput" placeholder="비밀번호  입력" maxlength="20" autocomplete="off"
             oninput="document.getElementById('lockError').textContent=''">
      <button class="lock-toggle" id="lockToggle" onclick="(function(){var i=document.getElementById('lockInput');i.type=i.type==='password'?'text':'password';document.getElementById('lockToggle').textContent=i.type==='password'?'👁':'🙈';})()">👁</button>
    </div>
    <button class="lock-btn" onclick="checkPassword()">확인</button>
    <div class="lock-error" id="lockError"></div>
    <div class="lock-footer">Created by 박정진</div>
  </div>
</div>
<header>
  <div class="header-inner">
    <span class="logo-text">kt <span>skylife</span></span>
    <span class="header-badge">MOBILE</span>
    <span class="header-title">전산 매뉴얼</span>
  </div>
</header>
<nav class="app-subnav"><div class="app-subnav-inner"><a href="index.html" class="app-subnav-item"><span class="app-subnav-icon">🏠</span>현장영업</a><a href="plans.html" class="app-subnav-item"><span class="app-subnav-icon">📋</span>요금제</a><a href="addons.html" class="app-subnav-item"><span class="app-subnav-icon">➕</span>부가서비스</a><a href="calculator.html" class="app-subnav-item"><span class="app-subnav-icon">💰</span>수수료</a><a href="faq.html" class="app-subnav-item"><span class="app-subnav-icon">❓</span>FAQ</a><a href="manual.html" class="app-subnav-item active"><span class="app-subnav-icon">📖</span>매뉴얼</a><a href="inquiry.html" class="app-subnav-item"><span class="app-subnav-icon">💬</span>문의</a></div></nav>

<div class="search-bar">
  <div class="search-bar-inner">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-input" id="searchInput" placeholder="기능명, 키워드로 검색..." autocomplete="off">
      <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
    </div>
  </div>
</div>

<main>
  <section id="categories-section">
    <div class="hero">
      <div class="hero-tag">📋 MANUAL</div>
      <h1>모바일 <em>전산 매뉴얼</em></h1>
      <p>개통, CS, 안면인증 등 전산 기능별 처리 절차를 확인하세요.</p>
      <div class="red-line"></div>
    </div>
    <div class="section-title">카테고리</div>
    <div class="categories-grid" id="categoriesGrid"></div>
  </section>

  <section id="items-section">
    <div class="items-header">
      <button class="back-btn" onclick="showCategories()">← 전체</button>
      <div class="items-title" id="itemsSectionTitle"></div>
    </div>
    <div class="section-title" id="itemsSectionSubtitle"></div>
    <div class="items-grid" id="itemsGrid"></div>
  </section>

  <section id="search-section">
    <div class="section-title">검색 결과</div>
    <div class="search-result-count" id="searchResultCount"></div>
    <div id="searchResults"></div>
  </section>
</main>

<footer>KT Skylife 모바일 전산 매뉴얼 · <strong>create by 박정진</strong></footer>

<script>
  let DATA = { categories: [], items: [] };
  let currentCategory = null;

  async function loadData() {
    try {
      const res = await fetch('data/manual.json?t=' + Date.now());
      DATA = await res.json();
      init();
    } catch (e) {
      document.querySelector('main').textContent = '데이터를 불러올 수 없습니다.';
    }
  }

  function init() {
    renderCategories();
    setupSearch();
    const params = new URLSearchParams(location.search);
    const catId = params.get('cat');
    if (catId) showItems(catId);
  }

  function renderCategories() {
    const grid = document.getElementById('categoriesGrid');
    grid.innerHTML = '';
    DATA.categories.forEach(cat => {
      const count = DATA.items.filter(i => i.categoryId === cat.id).length;
      const card = document.createElement('div');
      card.className = 'category-card';
      card.onclick = () => showItems(cat.id);
      const icon = document.createElement('div'); icon.className = 'category-icon'; icon.textContent = cat.icon;
      const name = document.createElement('div'); name.className = 'category-name'; name.textContent = cat.name;
      const desc = document.createElement('div'); desc.className = 'category-desc'; desc.textContent = cat.description;
      const cnt = document.createElement('span'); cnt.className = 'category-count'; cnt.textContent = count + '개';
      card.append(icon, name, desc, cnt);
      grid.appendChild(card);
    });
    document.getElementById('categories-section').style.display = '';
    document.getElementById('items-section').style.display = 'none';
    document.getElementById('search-section').style.display = 'none';
  }

  function showItems(categoryId) {
    currentCategory = categoryId;
    const cat = DATA.categories.find(c => c.id === categoryId);
    const items = DATA.items.filter(i => i.categoryId === categoryId);
    document.getElementById('itemsSectionTitle').textContent = cat ? cat.icon + ' ' + cat.name : categoryId;
    document.getElementById('itemsSectionSubtitle').textContent = cat ? cat.description : '';
    const grid = document.getElementById('itemsGrid');
    grid.innerHTML = '';
    if (items.length === 0) {
      const empty = document.createElement('div'); empty.className = 'empty-state'; empty.textContent = '등록된 항목이 없습니다.';
      grid.appendChild(empty);
    } else {
      items.forEach(item => {
        const a = document.createElement('a'); a.className = 'item-card'; a.href = 'manual-detail.html?id=' + encodeURIComponent(item.id);
        const lbl = document.createElement('div'); lbl.className = 'item-card-label'; lbl.textContent = cat ? cat.name : '';
        const t = document.createElement('div'); t.className = 'item-title'; t.textContent = item.title;
        const d = document.createElement('div'); d.className = 'item-desc'; d.textContent = item.description;
        const m = document.createElement('div'); m.className = 'item-meta';
        const s = document.createElement('span'); s.className = 'item-steps'; s.textContent = '▶ ' + item.steps.length + '단계';
        const ar = document.createElement('span'); ar.className = 'item-arrow'; ar.textContent = '→';
        m.append(s, ar); a.append(lbl, t, d, m); grid.appendChild(a);
      });
    }
    document.getElementById('categories-section').style.display = 'none';
    document.getElementById('items-section').style.display = 'block';
    document.getElementById('search-section').style.display = 'none';
    history.pushState({}, '', '?cat=' + encodeURIComponent(categoryId));
  }

  function showCategories() {
    currentCategory = null;
    renderCategories();
    history.pushState({}, '', location.pathname);
    document.getElementById('searchInput').value = '';
    document.getElementById('searchClear').classList.remove('visible');
  }

  function setupSearch() {
    const input = document.getElementById('searchInput');
    const clearBtn = document.getElementById('searchClear');
    input.addEventListener('input', () => {
      const q = input.value.trim();
      clearBtn.classList.toggle('visible', q.length > 0);
      if (!q) { if (currentCategory) showItems(currentCategory); else renderCategories(); }
      else doSearch(q);
    });
  }

  function clearSearch() {
    const input = document.getElementById('searchInput');
    input.value = '';
    document.getElementById('searchClear').classList.remove('visible');
    if (currentCategory) showItems(currentCategory); else renderCategories();
    input.focus();
  }

  function doSearch(q) {
    const lq = q.toLowerCase();
    const results = DATA.items.filter(item => {
      const cat = DATA.categories.find(c => c.id === item.categoryId);
      return item.title.toLowerCase().includes(lq) ||
        item.description.toLowerCase().includes(lq) ||
        item.keywords.some(k => k.toLowerCase().includes(lq)) ||
        item.steps.some(s => s.title.toLowerCase().includes(lq) || s.description.toLowerCase().includes(lq)) ||
        (cat && cat.name.toLowerCase().includes(lq));
    });
    document.getElementById('searchResultCount').textContent = '"' + q + '" 검색 결과 — ' + results.length + '건';
    const el = document.getElementById('searchResults');
    el.innerHTML = '';
    if (!results.length) {
      const d = document.createElement('div'); d.className = 'no-results';
      const i = document.createElement('div'); i.className = 'no-results-icon'; i.textContent = '🔍';
      const m = document.createElement('div'); m.textContent = '검색 결과가 없습니다.';
      d.append(i, m); el.appendChild(d);
    } else {
      results.forEach(item => {
        const cat = DATA.categories.find(c => c.id === item.categoryId);
        const a = document.createElement('a'); a.className = 'result-item'; a.href = 'manual-detail.html?id=' + encodeURIComponent(item.id);
        const badge = document.createElement('span'); badge.className = 'result-badge'; badge.textContent = cat ? cat.icon + ' ' + cat.name : '';
        const info = document.createElement('div'); info.className = 'result-info';
        const titleEl = document.createElement('div'); titleEl.className = 'result-title'; highlightText(titleEl, item.title, q);
        const descEl = document.createElement('div'); descEl.className = 'result-desc'; highlightText(descEl, item.description, q);
        info.append(titleEl, descEl); a.append(badge, info); el.appendChild(a);
      });
    }
    document.getElementById('categories-section').style.display = 'none';
    document.getElementById('items-section').style.display = 'none';
    document.getElementById('search-section').style.display = 'block';
  }

  function highlightText(el, text, q) {
    el.innerHTML = '';
    if (!q) { el.textContent = text; return; }
    const escaped = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const parts = text.split(new RegExp('(' + escaped + ')', 'gi'));
    parts.forEach(part => {
      if (part.toLowerCase() === q.toLowerCase()) {
        const mark = document.createElement('mark'); mark.className = 'hl'; mark.textContent = part; el.appendChild(mark);
      } else { el.appendChild(document.createTextNode(part)); }
    });
  }

  window.addEventListener('popstate', () => {
    const catId = new URLSearchParams(location.search).get('cat');
    if (catId) showItems(catId); else renderCategories();
  });

  loadData();
</script>
<script>
  (function(){
    if(sessionStorage.getItem("manual_auth")==="ok"){
      document.getElementById("lockOverlay").style.display="none";
    }
    document.getElementById("lockInput").addEventListener("keydown",function(e){if(e.key==="Enter")checkPassword();});
  })();
  const CORRECT_HASH = "c8fd219f17e06dac4b1977f8a2f343daa1a095b61bccd1ab71db7c98e435ced4";
  async function sha256(m){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(m));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');}
  async function checkPassword(){
    var v=document.getElementById("lockInput").value;
    if(await sha256(v)===CORRECT_HASH){
      sessionStorage.setItem("manual_auth","ok");
      document.getElementById("lockOverlay").style.display="none";
    } else {
      document.getElementById("lockError").textContent="비밀번호가 올바르지 않습니다.";
      document.getElementById("lockInput").value="";
      document.getElementById("lockInput").focus();
    }
  }
</script>
</body>
</html>
