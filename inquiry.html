<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>문의 게시판 | kt skylife</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --red: #E60012;
      --red2: #CC0010;
      --red-light: #FFF5F5;
      --red-border: #FFCCCC;
      --black: #1A1A1A;
      --dark: #333333;
      --mid: #666666;
      --light: #999999;
      --bg: #FFFFFF;
      --bg2: #F7F7F7;
      --bg3: #FAFAFA;
      --border: #E8E8E8;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg2); color: var(--dark); min-height: 100vh; }

    header { background: var(--bg); border-top: 3px solid var(--red); border-bottom: 1px solid var(--border); padding: 0 20px; position: sticky; top: 0; z-index: 200; box-shadow: var(--shadow); }
    .header-inner { max-width: 700px; margin: 0 auto; display: flex; align-items: center; height: 56px; gap: 12px; }
    .logo-text { font-size: 18px; font-weight: 900; color: var(--black); letter-spacing: -.02em; white-space: nowrap; }
    .logo-text span { color: var(--red); }
    .header-badge { background: var(--red); color: #fff; font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 3px; letter-spacing: .04em; white-space: nowrap; }
    .header-title { font-size: 15px; font-weight: 700; color: var(--dark); }

    .tabs-wrap { max-width: 700px; margin: 20px auto 0; padding: 0 16px; display: flex; }
    .tab-btn { flex: 1; padding: 12px 8px; border: 1px solid var(--border); background: var(--bg); font-size: 14px; font-weight: 700; color: var(--light); cursor: pointer; transition: all .2s; font-family: inherit; }
    .tab-btn:first-child { border-radius: 8px 0 0 0; }
    .tab-btn:last-child { border-radius: 0 8px 0 0; border-left: none; }
    .tab-btn:nth-child(2) { border-left: none; }
    .tab-btn.active { background: var(--red); color: #fff; border-color: var(--red); }

    .container { max-width: 700px; margin: 0 auto; padding: 0 16px 60px; }
    .panel { display: none; background: var(--bg); border-radius: 0 0 12px 12px; border: 1px solid var(--border); border-top: none; padding: 24px; }
    .panel.active { display: block; }

    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; font-weight: 700; color: var(--dark); margin-bottom: 6px; }
    .form-group input, .form-group textarea {
      width: 100%; padding: 12px 14px; border: 1px solid var(--border);
      border-radius: 8px; font-size: 14px; font-family: inherit;
      color: var(--dark); background: var(--bg); transition: border-color .2s;
    }
    .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--red); }
    .form-group textarea { resize: vertical; min-height: 120px; }
    .form-hint { font-size: 11px; color: var(--light); margin-top: 4px; }

    .btn { width: 100%; padding: 14px; background: var(--red); color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 700; font-family: inherit; cursor: pointer; transition: background .2s; }
    .btn:hover { background: var(--red2); }
    .btn-secondary { background: var(--bg); color: var(--red); border: 1px solid var(--red-border); margin-top: 10px; }
    .btn-secondary:hover { background: var(--red-light); }

    .alert { padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; }
    .alert-error { background: var(--red-light); border: 1px solid var(--red-border); color: var(--red2); }
    .alert-success { background: #f0fff4; border: 1px solid #b7ebc5; color: #276749; }

    .section-title { font-size: 13px; font-weight: 700; color: var(--mid); margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }

    .inquiry-item { border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 12px; background: var(--bg3); }
    .inquiry-item-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; flex-wrap: wrap; gap: 6px; }
    .inquiry-meta { display: flex; align-items: center; gap: 8px; }
    .inquiry-name { font-size: 14px; font-weight: 700; color: var(--dark); }
    .inquiry-date { font-size: 11px; color: var(--light); }
    .inquiry-content { font-size: 14px; color: var(--mid); line-height: 1.7; white-space: pre-wrap; word-break: break-all; margin-bottom: 10px; }

    .status-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
    .status-등록 { background: #FFF3CD; color: #856404; border: 1px solid #ffc107; }
    .status-완료 { background: #D4EDDA; color: #155724; border: 1px solid #28a745; }

    .btn-complete { padding: 7px 16px; background: var(--red); color: #fff; border: none; border-radius: 6px; font-size: 12px; font-weight: 700; font-family: inherit; cursor: pointer; transition: background .2s; }
    .btn-complete:hover { background: var(--red2); }
    .btn-complete:disabled { background: var(--light); cursor: default; }

    .loading { text-align: center; padding: 40px; color: var(--light); font-size: 14px; }
    .empty { text-align: center; padding: 40px; color: var(--light); font-size: 14px; }

    footer { text-align: center; padding: 24px 20px; font-size: 11px; color: var(--light); border-top: 1px solid var(--border); background: var(--bg); }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <span class="logo-text">kt <span>skylife</span></span>
    <span class="header-badge">문의 게시판</span>
    <span class="header-title">고객 문의</span>
  </div>
</header>

<div class="tabs-wrap">
  <button class="tab-btn active" onclick="showTab('register')">문의 등록</button>
  <button class="tab-btn" onclick="showTab('myinquiry')">내 문의 확인</button>
  <button class="tab-btn" onclick="showTab('admin')">관리자</button>
</div>

<div class="container">

  <!-- 문의 등록 -->
  <div id="panel-register" class="panel active">
    <div id="reg-alert"></div>
    <div class="form-group">
      <label>이름</label>
      <input type="text" id="reg-name" placeholder="이름 입력" maxlength="20" autocomplete="off">
      <div class="form-hint">* 내 문의 확인 시 아이디로 사용됩니다</div>
    </div>
    <div class="form-group">
      <label>비밀번호</label>
      <input type="password" id="reg-pw" placeholder="비밀번호 입력" autocomplete="new-password">
    </div>
    <div class="form-group">
      <label>비밀번호 확인</label>
      <input type="password" id="reg-pw2" placeholder="비밀번호 재입력" autocomplete="new-password">
    </div>
    <div class="form-group">
      <label>문의 내용</label>
      <textarea id="reg-content" placeholder="문의하실 내용을 자유롭게 입력해주세요"></textarea>
    </div>
    <button class="btn" onclick="submitInquiry()">문의 등록하기</button>
  </div>

  <!-- 내 문의 확인 -->
  <div id="panel-myinquiry" class="panel">
    <div id="my-login-area">
      <div id="my-alert"></div>
      <div class="form-group">
        <label>이름</label>
        <input type="text" id="my-name" placeholder="등록 시 입력한 이름" autocomplete="off">
      </div>
      <div class="form-group">
        <label>비밀번호</label>
        <input type="password" id="my-pw" placeholder="등록 시 입력한 비밀번호">
      </div>
      <button class="btn" onclick="loadMyInquiries()">내 문의 확인</button>
    </div>
    <div id="my-list" style="display:none;"></div>
  </div>

  <!-- 관리자 -->
  <div id="panel-admin" class="panel">
    <div id="admin-login-area">
      <div id="admin-alert"></div>
      <div class="form-group">
        <label>관리자 비밀번호</label>
        <input type="password" id="admin-pw" placeholder="관리자 비밀번호 입력">
      </div>
      <button class="btn" onclick="adminLogin()">로그인</button>
    </div>
    <div id="admin-list" style="display:none;"></div>
  </div>

</div>

<footer>Created by 박정진 &nbsp;|&nbsp; 고객 문의 게시판</footer>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getFirestore, collection, addDoc, getDocs,
    query, where, orderBy, updateDoc, doc, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBstEQbmNKH5BJJqZrR3fJ9P-eqr0A39Rw",
    authDomain: "skylife-inquiry.firebaseapp.com",
    projectId: "skylife-inquiry",
    storageBucket: "skylife-inquiry.firebasestorage.app",
    messagingSenderId: "186224279969",
    appId: "1:186224279969:web:138474ca9592cff3868be0"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  // SHA-256 해시
  async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }

  // HTML 특수문자 이스케이프 (XSS 방지)
  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  // 날짜 포맷
  function fmt(ts) {
    if (!ts) return '-';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }

  // 알림 표시
  function showAlert(id, msg, type = 'error') {
    const el = document.getElementById(id);
    const div = document.createElement('div');
    div.className = `alert alert-${type}`;
    div.textContent = msg;
    el.innerHTML = '';
    el.appendChild(div);
    if (type === 'success') setTimeout(() => el.innerHTML = '', 5000);
  }

  // 탭 전환
  window.showTab = function(tab) {
    ['register','myinquiry','admin'].forEach((t, i) => {
      document.querySelectorAll('.tab-btn')[i].classList.toggle('active', t === tab);
      document.getElementById('panel-' + t).classList.toggle('active', t === tab);
    });
  };

  // ── 문의 카드 DOM 생성 ─────────────────────
  function createInquiryCard(data, docId, isAdmin) {
    const item = document.createElement('div');
    item.className = 'inquiry-item';
    if (docId) item.id = 'item-' + docId;

    const header = document.createElement('div');
    header.className = 'inquiry-item-header';

    const nameEl = document.createElement('span');
    nameEl.className = 'inquiry-name';
    nameEl.textContent = data.name;

    const meta = document.createElement('div');
    meta.className = 'inquiry-meta';

    const badge = document.createElement('span');
    badge.className = `status-badge status-${data.status}`;
    badge.textContent = data.status;
    if (docId) badge.id = 'status-' + docId;

    const dateEl = document.createElement('span');
    dateEl.className = 'inquiry-date';
    dateEl.textContent = fmt(data.createdAt);

    meta.appendChild(badge);
    meta.appendChild(dateEl);
    header.appendChild(nameEl);
    header.appendChild(meta);

    const contentEl = document.createElement('div');
    contentEl.className = 'inquiry-content';
    contentEl.textContent = data.content;

    item.appendChild(header);
    item.appendChild(contentEl);

    if (isAdmin && data.status === '등록' && docId) {
      const btn = document.createElement('button');
      btn.className = 'btn-complete';
      btn.id = 'btn-' + docId;
      btn.textContent = '완료 처리';
      btn.addEventListener('click', () => completeInquiry(docId));
      item.appendChild(btn);
    }

    return item;
  }

  // ── 문의 등록 ──────────────────────────────
  window.submitInquiry = async function() {
    const name    = document.getElementById('reg-name').value.trim();
    const pw      = document.getElementById('reg-pw').value;
    const pw2     = document.getElementById('reg-pw2').value;
    const content = document.getElementById('reg-content').value.trim();

    if (!name)      return showAlert('reg-alert', '이름을 입력해주세요.');
    if (!pw)        return showAlert('reg-alert', '비밀번호를 입력해주세요.');
    if (pw !== pw2) return showAlert('reg-alert', '비밀번호가 일치하지 않습니다.');
    if (!content)   return showAlert('reg-alert', '문의 내용을 입력해주세요.');

    try {
      const pwHash = await sha256(pw);
      await addDoc(collection(db, 'inquiries'), {
        name, pwHash, content, status: '등록', createdAt: serverTimestamp()
      });
      showAlert('reg-alert', '문의가 성공적으로 등록되었습니다.', 'success');
      ['reg-name','reg-pw','reg-pw2','reg-content'].forEach(id => document.getElementById(id).value = '');
    } catch(e) {
      showAlert('reg-alert', '등록 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
    }
  };

  // ── 내 문의 확인 ───────────────────────────
  window.loadMyInquiries = async function() {
    const name = document.getElementById('my-name').value.trim();
    const pw   = document.getElementById('my-pw').value;
    if (!name || !pw) return showAlert('my-alert', '이름과 비밀번호를 모두 입력해주세요.');

    try {
      const pwHash = await sha256(pw);
      const snap   = await getDocs(query(collection(db, 'inquiries'), where('name', '==', name)));
      const mine   = snap.docs.filter(d => d.data().pwHash === pwHash);

      if (mine.length === 0) return showAlert('my-alert', '이름 또는 비밀번호가 올바르지 않습니다.');

      mine.sort((a, b) => (b.data().createdAt?.seconds ?? 0) - (a.data().createdAt?.seconds ?? 0));

      document.getElementById('my-login-area').style.display = 'none';
      const list = document.getElementById('my-list');
      list.style.display = 'block';
      list.innerHTML = '';

      const title = document.createElement('div');
      title.className = 'section-title';
      title.textContent = `${name}님의 문의 (${mine.length}건)`;
      list.appendChild(title);

      mine.forEach(docSnap => list.appendChild(createInquiryCard(docSnap.data(), null, false)));

      const resetBtn = document.createElement('button');
      resetBtn.className = 'btn btn-secondary';
      resetBtn.textContent = '다른 계정으로 확인';
      resetBtn.addEventListener('click', resetMyView);
      list.appendChild(resetBtn);

    } catch(e) {
      showAlert('my-alert', '조회 중 오류가 발생했습니다.');
    }
  };

  function resetMyView() {
    document.getElementById('my-login-area').style.display = 'block';
    document.getElementById('my-list').style.display = 'none';
    document.getElementById('my-list').innerHTML = '';
    document.getElementById('my-name').value = '';
    document.getElementById('my-pw').value = '';
  }

  // ── 관리자 로그인 ──────────────────────────
  window.adminLogin = async function() {
    const pw = document.getElementById('admin-pw').value;
    // 관리자 비밀번호: skylife0402
    if (await sha256(pw) !== await sha256('20260306')) {
      return showAlert('admin-alert', '비밀번호가 올바르지 않습니다.');
    }
    document.getElementById('admin-login-area').style.display = 'none';
    loadAllInquiries();
  };

  async function loadAllInquiries() {
    const list = document.getElementById('admin-list');
    list.style.display = 'block';
    list.innerHTML = '';

    const loading = document.createElement('div');
    loading.className = 'loading';
    loading.textContent = '불러오는 중...';
    list.appendChild(loading);

    try {
      const snap = await getDocs(query(collection(db, 'inquiries'), orderBy('createdAt', 'desc')));
      list.innerHTML = '';

      if (snap.empty) {
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.textContent = '등록된 문의가 없습니다.';
        list.appendChild(empty);
        return;
      }

      const pending = snap.docs.filter(d => d.data().status === '등록').length;
      const title   = document.createElement('div');
      title.className = 'section-title';
      title.textContent = `전체 문의 ${snap.size}건`;
      const span = document.createElement('span');
      span.style.cssText = 'color:var(--red)';
      span.textContent = ` · 미완료 ${pending}건`;
      title.appendChild(span);
      list.appendChild(title);

      snap.forEach(docSnap => list.appendChild(createInquiryCard(docSnap.data(), docSnap.id, true)));

    } catch(e) {
      list.innerHTML = '';
      const err = document.createElement('div');
      err.className = 'empty';
      err.textContent = '불러오는 중 오류가 발생했습니다.';
      list.appendChild(err);
    }
  }

  async function completeInquiry(id) {
    const btn = document.getElementById('btn-' + id);
    if (btn) { btn.disabled = true; btn.textContent = '처리 중...'; }

    try {
      await updateDoc(doc(db, 'inquiries', id), { status: '완료' });
      const badge = document.getElementById('status-' + id);
      if (badge) { badge.textContent = '완료'; badge.className = 'status-badge status-완료'; }
      if (btn) btn.remove();
    } catch(e) {
      if (btn) { btn.disabled = false; btn.textContent = '완료 처리'; }
    }
  }
</script>

</body>
</html>
